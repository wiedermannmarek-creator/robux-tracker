name: robux-tracker

on:
  schedule:
    - cron: "*/10 * * * *"   # každých 10 minut
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Run bot
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: python main.py
